<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="160" viewBox="0 0 1400 160" role="img" aria-labelledby="title desc">
<title id="title">ANFL footer</title>
<desc id="desc">A sparse EchoState footer lockup.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0A1017"/>
    <stop offset="0.58" stop-color="#0D1621"/>
    <stop offset="1" stop-color="#071017"/>
  </linearGradient>
  <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="#9D4EDD" stop-opacity="0.38"/>
    <stop offset="1" stop-color="#9D4EDD" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="copperGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="#B87333" stop-opacity="0.26"/>
    <stop offset="1" stop-color="#B87333" stop-opacity="0"/>
  </radialGradient>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="microGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grain" width="64" height="64" patternUnits="userSpaceOnUse">
    <circle cx="7" cy="9" r="0.7" fill="#F7F3E8" opacity="0.06"/>
    <circle cx="31" cy="22" r="0.5" fill="#F7F3E8" opacity="0.05"/>
    <circle cx="51" cy="44" r="0.65" fill="#9D4EDD" opacity="0.08"/>
    <circle cx="19" cy="55" r="0.5" fill="#B87333" opacity="0.06"/>
  </pattern>
</defs><rect width="1400" height="160" rx="22" fill="url(#bg)"/><rect width="1400" height="160" rx="22" fill="url(#grain)"/><circle cx="72" cy="80" r="25" fill="none" stroke="#9D4EDD" stroke-width="2" stroke-dasharray="4 8"/><circle cx="72" cy="80" r="7" fill="#F7F3E8" filter="url(#microGlow)"/><text x="118" y="72" fill="#F7F3E8" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="690">MATT STACK / ECHOSTATE</text><text x="118" y="98" fill="#F7F3E8" opacity="0.55" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" letter-spacing="1.8">STATE · AUTHORITY · EVIDENCE · ROLLBACK</text><text x="1328" y="86" text-anchor="end" fill="#B87333" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="12" letter-spacing="2.2">AEONNOVA.AI</text></svg>
