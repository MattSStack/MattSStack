Glow)"/><line x1="112" y1="499" x2="112" y2="532" stroke="#B43D1F" stroke-opacity="0.35" stroke-dasharray="2 7"/><text x="145" y="495" fill="#F7F3E8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="18" font-weight="700">08</text><text x="208" y="495" fill="#F7F3E8" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="650" letter-spacing="0.6">SECURITY</text><text x="535" y="495" fill="#F7F3E8" opacity="0.55" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">identity, policy, trust boundaries</text><text x="1240" y="495" text-anchor="end" fill="#B43D1F" opacity="0.72" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" letter-spacing="1.6">L08</text><line x1="102" y1="542" x2="1298" y2="542" stroke="#F7F3E8" stroke-opacity="0.09"/><circle cx="112" cy="542" r="10" fill="#F7F3E8" fill-opacity="0.86" filter="url(#microGlow)"/><text x="145" y="548" fill="#F7F3E8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="18" font-weight="700">09</text><text x="208" y="548" fill="#F7F3E8" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="650" letter-spacing="0.6">COMMUNICATION</text><text x="535" y="548" fill="#F7F3E8" opacity="0.55" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">events, messaging, institutional output</text><text x="1240" y="548" text-anchor="end" fill="#F7F3E8" opacity="0.72" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" letter-spacing="1.6">L09</text></svg>
