-serif" font-size="18" font-weight="650" letter-spacing="0.6">NEURAL</text><text x="535" y="177" fill="#F7F3E8" opacity="0.55" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">models, routing, inference</text><text x="1240" y="177" text-anchor="end" fill="#2A7F7A" opacity="0.72" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" letter-spacing="1.6">L02</text><line x1="102" y1="224" x2="1298" y2="224" stroke="#F7F3E8" stroke-opacity="0.09"/><circle cx="112" cy="224" r="10" fill="#9D4EDD" fill-opacity="0.86" filter="url(#microGlow)"/><line x1="112" y1="234" x2="112" y2="267" stroke="#9D4EDD" stroke-opacity="0.35" stroke-dasharray="2 7"/><text x="145" y="230" fill="#F7F3E8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="18" font-weight="700">03</text><text x="208" y="230" fill="#F7F3E8" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="650" letter-spacing="0.6">AGENT</text><text x="535" y="230" fill="#F7F3E8" opacity="0.55" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">actors, review, delegation</text><text x="1240" y="230" text-anchor="end" fill="#9D4EDD" opacity="0.72" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="11" letter-spacing="1.6">L03</text><line x1="102" y1="277" x2="1298" y2="277" stroke="#F7F3E8" stroke-opacity="0.09"/><circle cx="112" cy="277" r="10" fill="#B87333" fill-opacity="0.86" filter="url(#microGlow)"/><line x1="112" y1="287" x2="112" y2="320" stroke="#B87333" stroke-opacity="0.35" stroke-dasharray="2 7"/><text x="145" y="283" fill="#F7F3E8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="18" font-weight="700">0